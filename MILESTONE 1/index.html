<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 1 - Documentation</title><!-- Shared Styles -->
<link rel="stylesheet" href="../styles.css">

<!-- Page-specific enhancements -->
<style>
    /* Background (copied from root for consistency) */
    .page-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
    }

    .grid-lines {
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(0,212,180,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,212,180,0.04) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
    }

    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.18;
    }

    .orb-1 {
        width: 600px; height: 600px;
        background: radial-gradient(circle, #00d4b4, transparent 70%);
        top: -200px; right: -100px;
        animation: drift 18s ease-in-out infinite alternate;
    }

    .orb-2 {
        width: 400px; height: 400px;
        background: radial-gradient(circle, #0066ff, transparent 70%);
        bottom: 20%; left: -100px;
        animation: drift 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(40px, 30px) scale(1.08); }
    }
    .status-badge {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-family: var(--font-mono);
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid var(--accent);
    }

    .card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 2rem;
        margin-top: 2rem;
        box-shadow: var(--shadow-md);
    }

    .eerd-container {
        margin-top: 1.5rem;
        text-align: center;
    }

    .eerd-image {
        width: 100%;
        max-width: 900px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        transition: transform var(--duration-med) var(--ease-out);
    }

    .eerd-image:hover {
        transform: scale(1.02);
    }

    .caption {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .download-section {
        margin-top: 1.5rem;
        text-align: center;
    }

    .download-btn {
        padding: 0.6rem 1.2rem;
        border-radius: var(--radius-md);
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        font-family: var(--font-body);
        cursor: pointer;
        transition: all var(--duration-fast) ease;
    }

    .download-btn:hover {
        background: var(--accent-dim);
        box-shadow: var(--shadow-glow);
    }

    .table-container {
        margin-top: 1.5rem;
        overflow-x: auto;
    }

    .styled-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
    }

    .styled-table th,
    .styled-table td {
        padding: 0.75rem 1rem;
        text-align: left;
    }

    .styled-table thead {
        background: var(--bg-elevated);
    }

    .styled-table th {
        color: var(--text-secondary);
        font-weight: 500;
    }

    .styled-table tbody tr {
        border-top: 1px solid var(--border);
        transition: background var(--duration-fast);
    }

    .styled-table tbody tr:hover {
        background: var(--bg-elevated);
    }
</style>

</head>
<body><!-- Animated Background (matched with root) -->
<div class="page-bg" aria-hidden="true">
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<!-- Navbar Placeholder (Injected via app.js) -->
<div id="nav-placeholder"></div>

<header class="container">
    <h1>Milestone 1: Database Documentation</h1>
    <span class="status-badge">Completed: April 15</span>
</header>

<main class="container">

    <!-- Section 1: EERD -->
    <section class="card">
        <h2>Database Design & EERD</h2>

        <div class="eerd-container">
            <img src="../assets/eerd-placeholder.png" alt="EERD Diagram" class="eerd-image">
            <p class="caption">Figure 1: Enhanced Entity-Relationship Diagram (EERD)</p>
        </div>

        <div class="download-section">
            <a href="../assets/eerd.pdf" download>
                <button class="download-btn">Download EERD (PDF)</button>
            </a>
        </div>
    </section>

    <!-- Section 2: Data Dictionary -->
    <section class="card">
        <h2>Data Dictionary</h2>

        <div class="table-container">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Table Name</th>
                        <th>Attribute</th>
                        <th>Data Type</th>
                        <th>Constraints</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Users</td>
                        <td>user_id</td>
                        <td>INT</td>
                        <td>PRIMARY KEY, AUTO_INCREMENT</td>
                    </tr>
                    <tr>
                        <td>Users</td>
                        <td>email</td>
                        <td>VARCHAR(255)</td>
                        <td>UNIQUE, NOT NULL</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>

<!-- Shared Script -->
<script src="../app.js"></script>

</body>
</html>
